name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        uses: Digreatbrian/buildozer-action@v2
        with:
          buildozer_version: stable

      - uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: bin/*.apk
